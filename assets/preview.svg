<svg xmlns="http://www.w3.org/2000/svg" width="760" height="600" viewBox="0 0 760 600" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial,sans-serif">
  <rect width="760" height="600" rx="12" fill="#0d1117"/>

  <!-- header -->
  <text x="28" y="44" fill="#e6edf3" font-size="20" font-weight="700">rizzdev-detective</text>
  <text x="28" y="64" fill="#7d8590" font-size="12">a batch of questions, answered in your browser — returned as JSON</text>

  <!-- section: Auth -->
  <text x="28" y="98" fill="#58a6ff" font-size="13" font-weight="600">Auth</text>
  <line x1="28" y1="106" x2="732" y2="106" stroke="#21262d" stroke-width="1"/>

  <!-- question card -->
  <rect x="28" y="116" width="704" height="164" rx="9" fill="#161b22" stroke="#30363d"/>
  <text x="44" y="140" fill="#e6edf3" font-size="14" font-weight="600">Which auth model for v1?</text>

  <!-- why tag -->
  <rect x="44" y="150" width="82" height="17" rx="4" fill="#2a2410"/>
  <text x="52" y="162" fill="#d29922" font-size="10">The problem</text>
  <text x="134" y="162" fill="#8b949e" font-size="11">Determines how much of week 1 goes to plumbing vs features.</text>

  <!-- recommendation -->
  <rect x="44" y="174" width="672" height="24" rx="6" fill="#10251a" stroke="#1c4a2e"/>
  <text x="54" y="190" fill="#3fb950" font-size="11"><tspan font-weight="700">Recommendation —</tspan> Pasted token: fastest path to a working v1.</text>

  <!-- option 1 (selected) -->
  <circle cx="54" cy="220" r="6" fill="#0d1117" stroke="#2f81f7" stroke-width="2"/>
  <circle cx="54" cy="220" r="3" fill="#2f81f7"/>
  <text x="70" y="218" fill="#e6edf3" font-size="12" font-weight="600">Pasted long-lived token</text>
  <text x="70" y="233" font-size="10"><tspan fill="#3fb950">+ No OAuth work</tspan><tspan fill="#8b949e">    </tspan><tspan fill="#f85149">- Manual rotation</tspan></text>

  <!-- option 2 -->
  <circle cx="54" cy="258" r="6" fill="#0d1117" stroke="#30363d" stroke-width="2"/>
  <text x="70" y="256" fill="#e6edf3" font-size="12" font-weight="600">OAuth</text>
  <text x="70" y="271" font-size="10"><tspan fill="#3fb950">+ Clean UX</tspan><tspan fill="#8b949e">    </tspan><tspan fill="#f85149">- Weeks of work</tspan></text>

  <!-- section: yes/no -->
  <text x="28" y="316" fill="#58a6ff" font-size="13" font-weight="600">Ready?</text>
  <line x1="28" y1="324" x2="732" y2="324" stroke="#21262d" stroke-width="1"/>

  <rect x="28" y="334" width="704" height="66" rx="9" fill="#161b22" stroke="#30363d"/>
  <text x="44" y="360" fill="#e6edf3" font-size="14" font-weight="600">Merge this branch to master and push?</text>
  <!-- pills -->
  <rect x="44" y="370" width="58" height="24" rx="7" fill="#1f6feb"/>
  <text x="73" y="386" fill="#ffffff" font-size="12" font-weight="600" text-anchor="middle">Yes ★</text>
  <rect x="110" y="370" width="48" height="24" rx="7" fill="#21262d" stroke="#30363d"/>
  <text x="134" y="386" fill="#c9d1d9" font-size="12" font-weight="600" text-anchor="middle">No</text>

  <!-- section: multi two-col -->
  <text x="28" y="436" fill="#58a6ff" font-size="13" font-weight="600">Toppings — multi-select, two columns</text>
  <line x1="28" y1="444" x2="732" y2="444" stroke="#21262d" stroke-width="1"/>

  <rect x="28" y="454" width="704" height="96" rx="9" fill="#161b22" stroke="#30363d"/>

  <!-- col A -->
  <rect x="44" y="470" width="330" height="22" rx="6" fill="#0d1117" stroke="#30363d"/>
  <rect x="52" y="476" width="11" height="11" rx="3" fill="#2f81f7"/>
  <path d="M54.5 481.5 l2 2 l3.5 -3.5" stroke="#fff" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="70" y="485" fill="#e6edf3" font-size="12" font-weight="600">Cheese</text>

  <rect x="44" y="496" width="330" height="22" rx="6" fill="#0d1117" stroke="#30363d"/>
  <rect x="52" y="502" width="11" height="11" rx="3" fill="#0d1117" stroke="#30363d"/>
  <text x="70" y="511" fill="#e6edf3" font-size="12" font-weight="600">Mushroom</text>

  <rect x="44" y="522" width="330" height="22" rx="6" fill="#0d1117" stroke="#30363d"/>
  <rect x="52" y="528" width="11" height="11" rx="3" fill="#2f81f7"/>
  <path d="M54.5 533.5 l2 2 l3.5 -3.5" stroke="#fff" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="70" y="537" fill="#e6edf3" font-size="12" font-weight="600">Bacon</text>

  <!-- col B -->
  <rect x="386" y="470" width="330" height="22" rx="6" fill="#0d1117" stroke="#30363d"/>
  <rect x="394" y="476" width="11" height="11" rx="3" fill="#0d1117" stroke="#30363d"/>
  <text x="412" y="485" fill="#e6edf3" font-size="12" font-weight="600">Pepperoni</text>

  <rect x="386" y="496" width="330" height="22" rx="6" fill="#0d1117" stroke="#30363d"/>
  <rect x="394" y="502" width="11" height="11" rx="3" fill="#0d1117" stroke="#30363d"/>
  <text x="412" y="511" fill="#e6edf3" font-size="12" font-weight="600">Onion</text>

  <rect x="386" y="522" width="330" height="22" rx="6" fill="#0d1117" stroke="#30363d"/>
  <rect x="394" y="528" width="11" height="11" rx="3" fill="#0d1117" stroke="#30363d"/>
  <text x="412" y="537" fill="#e6edf3" font-size="12" font-weight="600">Sausage</text>

  <!-- submit -->
  <rect x="310" y="566" width="140" height="26" rx="7" fill="#238636"/>
  <text x="380" y="583" fill="#ffffff" font-size="12" font-weight="600" text-anchor="middle">Submit answers</text>
</svg>
