<svg xmlns="http://www.w3.org/2000/svg" width="760" height="620" viewBox="0 0 760 620">
  <style>
    text{font-family:"JetBrains Mono","Fira Code",ui-monospace,Menlo,Consolas,monospace}
    .dim{fill:#5b6577}.brt{fill:#e9edf4}.grn{fill:#7ee787}.grn2{fill:#8fd694}
    .blu{fill:#6cb6ff}.red{fill:#e58f8f}.amb{fill:#e2b86b}.mut{fill:#7d8799}
    .b{font-weight:700}
  </style>

  <rect width="760" height="620" fill="#05070b"/>
  <!-- terminal window -->
  <rect x="12.5" y="12.5" width="735" height="595" rx="11" fill="#0b0e14" stroke="#1e2636"/>
  <!-- title bar -->
  <rect x="13" y="13" width="734" height="34" rx="11" fill="#0d1219"/>
  <rect x="13" y="30" width="734" height="17" fill="#0d1219"/>
  <line x1="13" y1="47" x2="747" y2="47" stroke="#1a2230"/>
  <circle cx="34" cy="30" r="5.5" fill="#ff5f56"/>
  <circle cx="52" cy="30" r="5.5" fill="#ffbd2e"/>
  <circle cx="70" cy="30" r="5.5" fill="#27c93f"/>
  <text x="90" y="34" font-size="12" class="dim">rizzdev@detective: ./detective --live</text>

  <!-- command echo -->
  <text x="34" y="76" font-size="13"><tspan class="blu">$</tspan><tspan class="dim"> ./detective --interview</tspan></text>
  <rect x="205" y="66" width="7" height="14" fill="#7ee787"/>

  <!-- findings panel (blue) -->
  <rect x="34" y="92" width="692" height="66" rx="5" fill="#0c141d" stroke="#24344e"/>
  <rect x="46" y="86" width="66" height="13" rx="2" fill="#0b0e14"/>
  <text x="52" y="96" font-size="10.5" class="b blu" letter-spacing="1.5">findings</text>
  <text x="48" y="118" font-size="12" class="mut">Ran a --deep --online pass. Repo is a zero-dep Node skill</text>
  <text x="48" y="134" font-size="12"><tspan class="mut">grounded in </tspan><tspan class="amb">detective.mjs:1</tspan><tspan class="mut"> · docs: </tspan><tspan class="blu" text-decoration="underline">clack prompts</tspan></text>

  <!-- section panel: auth -->
  <rect x="34" y="176" width="692" height="150" rx="5" fill="#0b0e14" stroke="#26324a"/>
  <rect x="46" y="170" width="46" height="13" rx="2" fill="#0b0e14"/>
  <text x="52" y="180" font-size="10.5" class="b grn" letter-spacing="1.5">auth</text>

  <text x="48" y="202" font-size="13.5"><tspan class="grn b">? </tspan><tspan class="brt b">Which auth model for v1?</tspan></text>
  <text x="63" y="219" font-size="12"><tspan class="amb b">the problem:</tspan><tspan class="mut"> sets week-1 scope</tspan></text>
  <text x="63" y="237" font-size="12"><tspan class="grn b">» rec: </tspan><tspan class="grn2">pasted token — fastest path to a working v1</tspan></text>

  <text x="52" y="262" font-size="13"><tspan class="grn">(◉)</tspan><tspan class="brt b"> Pasted long-lived token</tspan></text>
  <text x="78" y="278" font-size="11.5"><tspan class="grn2 b">+ </tspan><tspan class="grn2">no oauth work</tspan><tspan class="dim">    </tspan><tspan class="red b">- </tspan><tspan class="red">manual rotation</tspan></text>
  <text x="52" y="300" font-size="13"><tspan class="dim">( )</tspan><tspan class="brt b"> OAuth</tspan></text>
  <text x="78" y="316" font-size="11.5"><tspan class="grn2 b">+ </tspan><tspan class="grn2">clean ux</tspan><tspan class="dim">          </tspan><tspan class="red b">- </tspan><tspan class="red">weeks of work</tspan></text>

  <!-- section panel: ready (yesno pills) -->
  <rect x="34" y="344" width="692" height="66" rx="5" fill="#0b0e14" stroke="#26324a"/>
  <rect x="46" y="338" width="52" height="13" rx="2" fill="#0b0e14"/>
  <text x="52" y="348" font-size="10.5" class="b grn" letter-spacing="1.5">ready</text>
  <text x="48" y="372" font-size="13.5"><tspan class="grn b">? </tspan><tspan class="brt b">Merge this branch and push?</tspan></text>
  <rect x="49" y="382" width="58" height="22" rx="4" fill="#101f14" stroke="#7ee787"/>
  <text x="78" y="397" font-size="12" class="b grn" text-anchor="middle">‹ Yes ›</text>
  <rect x="115" y="382" width="46" height="22" rx="4" fill="none" stroke="#2a3346"/>
  <text x="138" y="397" font-size="12" class="b mut" text-anchor="middle">No</text>

  <!-- section panel: priorities (drag-to-rank preview) -->
  <rect x="34" y="428" width="692" height="118" rx="5" fill="#0b0e14" stroke="#26324a"/>
  <rect x="46" y="422" width="118" height="13" rx="2" fill="#0b0e14"/>
  <text x="52" y="432" font-size="10.5" class="b grn" letter-spacing="1.5">priorities ↕ rank</text>
  <text x="48" y="454" font-size="13.5"><tspan class="grn b">? </tspan><tspan class="brt b">Drag to prioritize</tspan></text>
  <text x="60" y="476" font-size="13"><tspan class="dim">⠿ </tspan><tspan class="blu b">1.</tspan><tspan class="brt b"> Ship auth</tspan></text>
  <text x="60" y="497" font-size="13"><tspan class="dim">⠿ </tspan><tspan class="blu b">2.</tspan><tspan class="brt b"> Billing</tspan></text>
  <text x="60" y="518" font-size="13"><tspan class="dim">⠿ </tspan><tspan class="blu b">3.</tspan><tspan class="brt b"> Analytics</tspan></text>
  <text x="470" y="497" font-size="11" class="dim">space to grab · j/k to move</text>

  <!-- status + submit -->
  <circle cx="42" cy="571" r="4" fill="#6cb6ff"/>
  <text x="54" y="575" font-size="12" class="dim">your move</text>
  <rect x="588" y="560" width="138" height="26" rx="6" fill="#123020" stroke="#2c8f45"/>
  <text x="657" y="577" font-size="12.5" class="b grn" text-anchor="middle">⏎ submit answers</text>
</svg>
